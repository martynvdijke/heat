name: Release

on:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml
    secrets: inherit

  release:
    needs: ci
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout Repository
        uses: actions/checkout@v6


      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v5
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/exec
            @semantic-release/git
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build -o heat .

      - name: Build the Docker image
        run: docker build . --file Dockerfile --tag heat:latest
        
      - name: Push Docker image
        run: |
          docker tag martynvandijke/sandwitches:latest ghcr.io/martynvdijke/sandwitches:latest
          docker push martynvandijke/sandwitches:latest
          docker push ghcr.io/martynvdijke/sandwitches:latest
          echo "Pushing versioned tag: ${{ steps.uv_version.outputs.version }}"
          docker tag martynvandijke/sandwitches:latest martynvandijke/sandwitches:${{ steps.uv_version.outputs.version }}
          docker tag martynvandijke/sandwitches:latest ghcr.io/martynvdijke/sandwitches:${{ steps.uv_version.outputs.version }}
          docker push martynvandijke/sandwitches:${{ steps.uv_version.outputs.version }}
          docker push ghcr.io/martynvdijke/sandwitches:${{ steps.uv_version.outputs.version }}
