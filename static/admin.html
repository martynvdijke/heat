<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEAT Admin - Race Control</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        body { background: #f8f9fa; font-family: sans-serif; }
        .admin-header { background: #111; color: white; padding: 20px 0; border-bottom: 5px solid #d40000; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .btn-primary { background: #d40000; border-color: #d40000; }
        .btn-primary:hover { background: #b30000; border-color: #b30000; }
        .color-dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>
    <header class="admin-header mb-5">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="h3 mb-0"><i class="fa-solid fa-gears me-2"></i>HEAT RACE CONTROL</h1>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm me-2"><i class="fa-solid fa-eye me-1"></i> View Live Board</a>
                <button class="btn btn-danger btn-sm" onclick="logout()"><i class="fa-solid fa-sign-out-alt me-1"></i> Logout</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="row">
            <!-- Race Info Management -->
            <div class="col-lg-4">
                <div class="card">
                    <div class="card-header bg-white fw-bold"><i class="fa-solid fa-flag-checkered me-2 text-danger"></i>Next Race Info</div>
                    <div class="card-body">
                        <form id="race-form">
                            <div class="mb-3">
                                <label class="form-label small">Country</label>
                                <input type="text" class="form-control" name="country" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small">Track Name</label>
                                <input type="text" class="form-control" name="track" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label small">Laps</label>
                                <input type="number" class="form-control" name="laps" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mt-2">Update Race Data</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Racer Management -->
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header bg-white d-flex justify-content-between align-items-center">
                        <span class="fw-bold"><i class="fa-solid fa-users me-2 text-danger"></i>Racer Standings</span>
                        <button class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#racerModal" onclick="resetRacerForm()">
                            <i class="fa-solid fa-plus me-1"></i> Add Racer
                        </button>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-3">Rank</th>
                                    <th>Driver</th>
                                    <th>Photo</th>
                                    <th>Car</th>
                                    <th>Points</th>
                                    <th class="text-end pe-3">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="racer-list">
                                <!-- Dynamic Content -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Racer Modal -->
    <div class="modal fade" id="racerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="racerModalLabel">Edit Racer</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="racer-form">
                        <input type="hidden" name="id">
                        <div class="mb-3">
                            <label class="form-label small">Name</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label small">Profile Picture</label>
                            <div class="input-group">
                                <input type="text" class="form-control" name="profile_picture" id="profile_picture" required>
                                <button class="btn btn-outline-secondary" type="button" onclick="document.getElementById('imageInput').click()">
                                    <i class="fa-solid fa-upload"></i>
                                </button>
                            </div>
                            <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="uploadImage(this)">
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label small">Car Name</label>
                                <input type="text" class="form-control" name="car_name" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label small">Car Color</label>
                                <select class="form-select" name="car_color" required>
                                    <option value="red">Red</option>
                                    <option value="blue">Blue</option>
                                    <option value="green">Green</option>
                                    <option value="yellow">Yellow</option>
                                    <option value="grey">Grey</option>
                                </select>
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label small">Points</label>
                                <input type="number" class="form-control" name="points" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label small">Rank</label>
                                <input type="number" class="form-control" name="rank" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Save Racer Data</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let racers = [];
        const racerModal = new bootstrap.Modal(document.getElementById('racerModal'));

        // Load Initial Data
        async function init() {
            await loadRaceInfo();
            await loadRacers();
        }

        async function loadRaceInfo() {
            const res = await fetch('/api/race-info');
            const data = await res.json();
            const form = document.getElementById('race-form');
            Object.keys(data).forEach(key => {
                if (form[key]) form[key].value = data[key];
            });
        }

        async function loadRacers() {
            console.log('Loading racers...');
            const res = await fetch('/api/racers');
            console.log('Response status:', res.status);
            racers = await res.json();
            console.log('Racers loaded:', racers);
            const list = document.getElementById('racer-list');
            list.innerHTML = racers.map(r => `
                <tr>
                    <td class="ps-3 fw-bold">${r.rank}</td>
                    <td>${r.name}</td>
                    <td><img src="${r.profile_picture}" class="rounded-circle" width="30" height="30" onerror="this.style.display='none'"></td>
                    <td><span class="color-dot bg-${r.car_color}"></span> ${r.car_name}</td>
                    <td>${r.points}</td>
                    <td class="text-end pe-3">
                        <button class="btn btn-sm btn-outline-primary" onclick="editRacer(${r.id})">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger" onclick="deleteRacer(${r.id})">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
            console.log('Racers rendered, count:', racers.length);
        }

        // Form Submissions
        document.getElementById('race-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd);
            data.laps = parseInt(data.laps);
            
            console.log('Sending race info:', data);
            
            const res = await fetch('/api/race-info', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            console.log('Response:', res.status);
            if (res.ok) {
                alert('Race data updated!');
            } else {
                alert('Failed to update race data');
            }
        });

        document.getElementById('racer-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            const data = Object.fromEntries(fd);
            data.id = data.id ? parseInt(data.id) : 0;
            data.points = parseInt(data.points);
            data.rank = parseInt(data.rank);
            
            console.log('Sending racer:', data);
            
            const res = await fetch('/api/racers', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            console.log('Response:', res.status);
            racerModal.hide();
            loadRacers();
        });

        // Helper Functions
        function editRacer(id) {
            console.log('Editing racer ID:', id);
            console.log('Racers array:', racers);
            const r = racers.find(x => x.id === id);
            console.log('Found racer:', r);
            if (!r) {
                alert('Racer not found!');
                return;
            }
            const form = document.getElementById('racer-form');
            document.getElementById('racerModalLabel').textContent = 'Edit Racer: ' + r.name;
            Object.keys(r).forEach(key => {
                if (form[key]) form[key].value = r[key];
            });
            console.log('Form populated, showing modal');
            racerModal.show();
        }

        function resetRacerForm() {
            document.getElementById('racer-form').reset();
            document.getElementById('racer-form').id.value = "";
            document.getElementById('racerModalLabel').textContent = 'Add New Racer';
        }

        async function deleteRacer(id) {
            if (confirm('Are you sure you want to remove this racer?')) {
                await fetch(`/api/racers?id=${id}`, {method: 'DELETE'});
                loadRacers();
            }
        }

        async function logout() {
            await fetch('/api/logout', {method: 'POST'});
            window.location.href = '/login.html';
        }

        async function uploadImage(input) {
            const file = input.files[0];
            if (!file) return;
            
            const fd = new FormData();
            fd.append('image', file);
            
            const res = await fetch('/api/upload', {
                method: 'POST',
                body: fd
            });
            const data = await res.json();
            document.getElementById('profile_picture').value = data.url;
            input.value = '';
        }

        // Auth check
        fetch('/api/check-setup').then(res => res.json()).then(data => {
            if (!data.setup) window.location.href = '/setup.html';
        });

        init();
    </script>
</body>
</html>
