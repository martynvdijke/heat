<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEAT: Pedal to the Metal - Championship</title>
    <!-- Frameworks -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body>
    <div class="vintage-overlay"></div>
    
    <header class="py-4">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center position-relative">
            <div class="logo">
                <img src="/static/logo.svg" alt="HEAT Logo" width="60" height="60" class="me-2">
                <div>HEAT<span>Pedal to the Metal</span></div>
            </div>
            <div class="racing-stripes"></div>
            <nav class="mt-3 mt-md-0 d-flex align-items-center gap-4">
                <ul class="mb-0 d-flex gap-4 list-unstyled">
                    <li><a href="#" class="active text-uppercase"><i class="fa-solid fa-trophy me-2"></i>Standings</a></li>
                </ul>
                <button id="theme-toggle" class="theme-toggle ms-3" aria-label="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <section class="next-race mb-5">
            <div class="row align-items-stretch g-4">
                <div class="col-lg-8" id="race-info-container">
                    <!-- Dynamic Race Info -->
                    <h2 class="mb-4">Next HEAT Race</h2>
                    <div class="race-card d-flex flex-column flex-md-row justify-content-between align-items-center p-4">
                        <div class="race-info">
                            <span class="country d-block mb-1" id="race-country">... <i class="fa-solid fa-location-dot ms-2 text-warning"></i></span>
                            <span class="track d-block mb-2" id="race-track">...</span>
                            <div class="race-stats mt-3 d-flex gap-4">
                                <span class="badge bg-dark bg-opacity-25 p-2"><i class="fa-solid fa-flag-checkered me-1"></i> <span id="race-laps">0</span> LAPS</span>
                            </div>
                        </div>
                    </div>
                </div>
                </div>
            </div>
        </section>

        <div class="row g-5">
            <div class="col-xl-8">
                <h2 class="mb-4">Live Leaderboard <i class="fa-solid fa-tower-broadcast ms-2 text-danger small"></i></h2>
                <div class="table-responsive">
                    <table class="table custom-table">
                        <thead>
                            <tr>
                                <th class="ps-4">POS</th>
                                <th>DRIVER</th>
                                <th>CAR</th>
                                <th class="pe-4 text-end">PTS</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <!-- Dynamic Content -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="col-xl-4">
                <h2 class="mb-4">Championship <i class="fa-solid fa-list-ol ms-2 text-danger small"></i></h2>
                <div class="standings-list p-0" id="standings-container">
                    <!-- Dynamic Content -->
                </div>
            </div>
        </div>
    </main>

    <footer class="py-5 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-uppercase fw-bold"><i class="fa-solid fa-flag-checkered mx-2"></i> 2026 Heat Racing Federation <i class="fa-solid fa-flag-checkered mx-2"></i></p>
            <span class="small opacity-50 text-uppercase letter-spacing-2 mt-2 d-block">Developed for legends. Driven by heat.</span>
        </div>
    </footer>

    <script>
        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('i');
        const setTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeIcon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        };
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        setTheme(savedTheme);
        themeToggle.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

        // Fetch Data from API
        async function loadData() {
            try {
                // Load Race Info
                const raceResp = await fetch('/api/race-info');
                const race = await raceResp.json();
                document.getElementById('race-country').innerHTML = `${race.country} <i class="fa-solid fa-location-dot ms-2 text-warning"></i>`;
                document.getElementById('race-track').textContent = race.track;
                document.getElementById('race-laps').textContent = race.laps;

                // Load Racers
                const racerResp = await fetch('/api/racers');
                const racers = await racerResp.json();
                
                // Render Leaderboard
                const lbBody = document.getElementById('leaderboard-body');
                lbBody.innerHTML = racers.map((r, i) => `
                    <tr class="${i === 0 ? 'winner-row' : ''}">
                        <td class="ps-4">${r.rank}</td>
                        <td>
                            <div class="driver-info">
                                <img src="${r.profile_picture}" class="avatar" alt="${r.name}" onerror="this.style.display='none'">
                                <span class="driver-name"><span class="color-indicator ${r.car_color} me-2"></span>${r.name}</span>
                            </div>
                        </td>
                        <td>${r.car_name}</td>
                        <td class="pe-4 text-end ${i === 0 ? 'fw-bold' : ''}">${r.points}</td>
                    </tr>
                `).join('');

                // Render Standings (Sorted by Points)
                const standings = [...racers].sort((a, b) => b.points - a.points);
                const stContainer = document.getElementById('standings-container');
                stContainer.innerHTML = standings.map((r, i) => `
                    <div class="standing-item">
                        <span class="rank">${i + 1}</span>
                        <img src="${r.profile_picture}" class="avatar-sm" alt="${r.name}" onerror="this.style.display='none'">
                        <span class="driver text-uppercase fw-bold">${r.name}</span>
                        <span class="points ms-auto">${r.points} PTS</span>
                    </div>
                `).join('');

            } catch (err) {
                console.error("Failed to load racing data:", err);
            }
        }

        loadData();
    </script>
</body>
</html>
