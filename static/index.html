<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEAT: Pedal to the Metal - Championship</title>
    <!-- Frameworks -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <!-- Leaflet for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
    <div class="vintage-overlay"></div>
    
    <header class="py-4">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center position-relative">
            <div class="logo">
                <img src="/static/logo.svg" alt="HEAT Logo" width="60" height="60" class="me-2">
                <div>HEAT<span>Pedal to the Metal</span></div>
            </div>
            <div class="racing-stripes"></div>
            <nav class="mt-3 mt-md-0 d-flex align-items-center gap-4">
                <ul class="mb-0 d-flex gap-4 list-unstyled">
                    <li><a href="#" class="active text-uppercase"><i class="fa-solid fa-trophy me-2"></i>Standings</a></li>
                </ul>
                <button id="theme-toggle" class="theme-toggle ms-3" aria-label="Toggle Theme">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="container my-5">
        <section class="next-race mb-5">
            <div class="row align-items-stretch g-4">
                <div class="col-lg-8" id="race-info-container">
                    <!-- Dynamic Race Info -->
                    <h2 class="mb-4">Next HEAT Race</h2>
                    <div class="race-card d-flex flex-column flex-md-row justify-content-between align-items-center p-4">
                        <div class="race-info">
                            <span class="country d-block mb-1" id="race-country">... <i class="fa-solid fa-location-dot ms-2 text-warning"></i></span>
                            <span class="track d-block mb-2" id="race-track">...</span>
                            <div class="race-stats mt-3 d-flex gap-4">
                                <span class="badge bg-dark bg-opacity-25 p-2"><i class="fa-solid fa-flag-checkered me-1"></i> <span id="race-laps">0</span> LAPS</span>
                            </div>
                        </div>
                    </div>
                    <div id="circuit-map" class="mt-4 rounded shadow-sm" style="height: 300px; background: rgba(0,0,0,0.05); border: 2px solid var(--primary);"></div>
                </div>
                </div>
            </div>
        </section>

        <div class="row g-5">
            <div class="col-xl-8">
                <h2 class="mb-4">Live Leaderboard <i class="fa-solid fa-tower-broadcast ms-2 text-danger small"></i></h2>
                <div class="table-responsive">
                    <table class="table custom-table">
                        <thead>
                            <tr>
                                <th class="ps-4">POS</th>
                                <th>DRIVER</th>
                                <th>CAR</th>
                                <th>GAP</th>
                                <th class="pe-4 text-end">PTS</th>
                            </tr>
                        </thead>
                        <tbody id="leaderboard-body">
                            <!-- Dynamic Content -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="col-xl-4">
                <h2 class="mb-4">Championship <i class="fa-solid fa-list-ol ms-2 text-danger small"></i></h2>
                <div class="standings-list p-0" id="standings-container">
                    <!-- Dynamic Content -->
                </div>
            </div>
        </div>
    </main>

    <footer class="py-5 mt-5">
        <div class="container text-center">
            <p class="mb-0 text-uppercase fw-bold"><i class="fa-solid fa-flag-checkered mx-2"></i> 2026 Heat Racing Federation <i class="fa-solid fa-flag-checkered mx-2"></i></p>
            <span class="small opacity-50 text-uppercase letter-spacing-2 mt-2 d-block">Developed for legends. Driven by heat.</span>
        </div>
    </footer>

    <script>
        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('i');
        const setTheme = (theme) => {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            themeIcon.className = theme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
        };
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        setTheme(savedTheme);
        themeToggle.addEventListener('click', () => setTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'));

        let map;
        let racerMarkers = {};

        function getPointAtDistance(lineString, percentage) {
            const coords = lineString.geometry.coordinates;
            const totalLength = L.Polyline.fromGeoJSON(lineString).getLatLngs().reduce((acc, curr, i, arr) => {
                if (i === 0) return 0;
                return acc + arr[i-1].distanceTo(curr);
            }, 0);

            const targetLength = totalLength * (percentage % 1);
            let currentLength = 0;

            for (let i = 0; i < coords.length - 1; i++) {
                const p1 = L.latLng(coords[i][1], coords[i][0]);
                const p2 = L.latLng(coords[i+1][1], coords[i+1][0]);
                const dist = p1.distanceTo(p2);

                if (currentLength + dist >= targetLength) {
                    const ratio = (targetLength - currentLength) / dist;
                    return [
                        p1.lat + (p2.lat - p1.lat) * ratio,
                        p1.lng + (p2.lng - p1.lng) * ratio
                    ];
                }
                currentLength += dist;
            }
            return [coords[0][1], coords[0][0]];
        }

        const monzaGeoJSON = {
          "type": "Feature",
          "properties": {
            "id": "it-1922",
            "Location": "Monza",
            "Name": "Autodromo Nazionale Monza"
          },
          "geometry": {
            "type": "LineString",
            "coordinates": [
              [ 9.281223, 45.618975 ], [ 9.281692, 45.622832 ], [ 9.281905, 45.624449 ], [ 9.281928, 45.624515 ],
              [ 9.281994, 45.624553 ], [ 9.282076, 45.624562 ], [ 9.282177, 45.624553 ], [ 9.282272, 45.624548 ],
              [ 9.28236, 45.624553 ], [ 9.28242, 45.624586 ], [ 9.282467, 45.624633 ], [ 9.282479, 45.624675 ],
              [ 9.282479, 45.624722 ], [ 9.282147, 45.625604 ], [ 9.2821, 45.625844 ], [ 9.282082, 45.626061 ],
              [ 9.282106, 45.626297 ], [ 9.28223, 45.627447 ], [ 9.282278, 45.627635 ], [ 9.282337, 45.62781 ],
              [ 9.282426, 45.627998 ], [ 9.282544, 45.628201 ], [ 9.28268, 45.628399 ], [ 9.282881, 45.628621 ],
              [ 9.283088, 45.628804 ], [ 9.283367, 45.629012 ], [ 9.283669, 45.629196 ], [ 9.284006, 45.629365 ],
              [ 9.284367, 45.629511 ], [ 9.284775, 45.629653 ], [ 9.285184, 45.629752 ], [ 9.285634, 45.629841 ],
              [ 9.286143, 45.629903 ], [ 9.286664, 45.629936 ], [ 9.288694, 45.630058 ], [ 9.29118, 45.630162 ],
              [ 9.291328, 45.630171 ], [ 9.291405, 45.6302 ], [ 9.29147, 45.630247 ], [ 9.291552, 45.63045 ],
              [ 9.291588, 45.630506 ], [ 9.291647, 45.630544 ], [ 9.291748, 45.630567 ], [ 9.292085, 45.63061 ],
              [ 9.292452, 45.630666 ], [ 9.292973, 45.630784 ], [ 9.295299, 45.631331 ], [ 9.2955, 45.631364 ],
              [ 9.29569, 45.631364 ], [ 9.295873, 45.63134 ], [ 9.296003, 45.631303 ], [ 9.296128, 45.631251 ],
              [ 9.296246, 45.631194 ], [ 9.296394, 45.631081 ], [ 9.296477, 45.630992 ], [ 9.296536, 45.630883 ],
              [ 9.296566, 45.630761 ], [ 9.296666, 45.629988 ], [ 9.296856, 45.628668 ], [ 9.29685, 45.62855 ],
              [ 9.29682, 45.628474 ], [ 9.296773, 45.628408 ], [ 9.296996, 45.628361 ], [ 9.296554, 45.628295 ],
              [ 9.295033, 45.62772 ], [ 9.293796, 45.627235 ], [ 9.293026, 45.626938 ], [ 9.292653, 45.626787 ],
              [ 9.292233, 45.62658 ], [ 9.291931, 45.626419 ], [ 9.291671, 45.626259 ], [ 9.290321, 45.625448 ],
              [ 9.289363, 45.62484 ], [ 9.287338, 45.623596 ], [ 9.286119, 45.622846 ], [ 9.285953, 45.622728 ],
              [ 9.285888, 45.622653 ], [ 9.285876, 45.622578 ], [ 9.285876, 45.622488 ], [ 9.285918, 45.62229 ],
              [ 9.28593, 45.622182 ], [ 9.28593, 45.622026 ], [ 9.285912, 45.621941 ], [ 9.285864, 45.621833 ],

              [ 9.285184, 45.621258 ], [ 9.285107, 45.621196 ], [ 9.285048, 45.621112 ], [ 9.284994, 45.620956 ],
              [ 9.28487, 45.620244 ], [ 9.28474, 45.619485 ], [ 9.283734, 45.612679 ], [ 9.283692, 45.612434 ],

              [ 9.283142, 45.611939 ], [ 9.282941, 45.611887 ], [ 9.28271, 45.611858 ], [ 9.282514, 45.611868 ],
              [ 9.282331, 45.611896 ], [ 9.282118, 45.611953 ], [ 9.281911, 45.612019 ], [ 9.281757, 45.612094 ],
              [ 9.281573, 45.612193 ], [ 9.281366, 45.612349 ], [ 9.281224, 45.61249 ], [ 9.2811, 45.612641 ],
              [ 9.280993, 45.61282 ], [ 9.280893, 45.613018 ], [ 9.280816, 45.613221 ], [ 9.28078, 45.613395 ],
              [ 9.280739, 45.613659 ], [ 9.280733, 45.613923 ], [ 9.280727, 45.614173 ], [ 9.280709, 45.614668 ],
              [ 9.280697, 45.615102 ], [ 9.280709, 45.615573 ], [ 9.280786, 45.61619 ], [ 9.281076, 45.618142 ],
              [ 9.281223, 45.618975 ]
            ]
          }
        };

        function initMap() {
            if (map) return;
            map = L.map('circuit-map', {
                zoomControl: false,
                attributionControl: false
            }).setView([45.621, 9.288], 14);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                maxZoom: 19
            }).addTo(map);

            L.geoJSON(monzaGeoJSON, {
                style: {
                    color: '#d40000',
                    weight: 5,
                    opacity: 0.8
                }
            }).addTo(map);

            // Fit bounds after a short delay to ensure container is ready
            setTimeout(() => {
                const layer = L.geoJSON(monzaGeoJSON);
                map.fitBounds(layer.getBounds(), { padding: [20, 20] });
            }, 100);
        }

        function updateMapMarkers(racers) {
            if (!map) return;
            const totalVakjes = 100; // Assuming 100 spaces per lap

            racers.forEach(r => {
                const percentage = r.position / totalVakjes;
                const pos = getPointAtDistance(monzaGeoJSON, percentage);

                if (racerMarkers[r.id]) {
                    racerMarkers[r.id].setLatLng(pos);
                } else {
                    const colorMap = {
                        'red': '#ff4444',
                        'blue': '#4444ff',
                        'green': '#44ff44',
                        'yellow': '#ffff44',
                        'grey': '#aaaaaa'
                    };
                    racerMarkers[r.id] = L.circleMarker(pos, {
                        radius: 8,
                        fillColor: colorMap[r.car_color] || '#ffffff',
                        color: '#000',
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map).bindTooltip(r.name, {
                        permanent: false,
                        direction: 'top'
                    });
                }
            });

            // Cleanup removed racers
            Object.keys(racerMarkers).forEach(id => {
                if (!racers.find(r => r.id == id)) {
                    map.removeLayer(racerMarkers[id]);
                    delete racerMarkers[id];
                }
            });
        }

        function renderRacers(racers) {
            // Update Map
            updateMapMarkers(racers);

            // Render Leaderboard (GAP calculation)
            const lbBody = document.getElementById('leaderboard-body');

            // Sort by rank for leaderboard (rank 1 is leader)
            const sortedByRank = [...racers].sort((a, b) => a.rank - b.rank);
            const leaderPosition = sortedByRank.length > 0 ? sortedByRank[0].position : 0;

            lbBody.innerHTML = sortedByRank.map((r, i) => {
                let gapText = "-";
                if (i > 0) {
                    const gap = leaderPosition - r.position;
                    gapText = gap > 0 ? `+${gap} <small>VAKJES</small>` : "0";
                }

                return `
                    <tr class="${i === 0 ? 'winner-row' : ''}">
                        <td class="ps-4">${r.rank}</td>
                        <td>
                            <div class="driver-info">
                                <img src="${r.profile_picture}" class="avatar" alt="${r.name}" onerror="this.style.display='none'">
                                <span class="driver-name"><span class="color-indicator ${r.car_color} me-2"></span>${r.name}</span>
                            </div>
                        </td>
                        <td>${r.car_name}</td>
                        <td class="gap-cell">${gapText}</td>
                        <td class="pe-4 text-end ${i === 0 ? 'fw-bold' : ''}">${r.points}</td>
                    </tr>
                `;
            }).join('');

            // Render Standings (Sorted by Points)
            const standings = [...racers].sort((a, b) => b.points - a.points);
            const stContainer = document.getElementById('standings-container');
            stContainer.innerHTML = standings.map((r, i) => `
                <div class="standing-item">
                    <span class="rank">${i + 1}</span>
                    <img src="${r.profile_picture}" class="avatar-sm" alt="${r.name}" onerror="this.style.display='none'">
                    <span class="driver text-uppercase fw-bold">${r.name}</span>
                    <span class="points ms-auto">${r.points} PTS</span>
                </div>
            `).join('');
        }

        // Fetch Data from API
        async function loadData() {
            try {
                // Load Race Info
                const raceResp = await fetch('/api/race-info');
                const race = await raceResp.json();
                document.getElementById('race-country').innerHTML = `${race.country} <i class="fa-solid fa-location-dot ms-2 text-warning"></i>`;
                document.getElementById('race-track').textContent = race.track;
                document.getElementById('race-laps').textContent = race.laps;

                // Load Map
                initMap();

                // Load Racers (Initial)
                const racerResp = await fetch('/api/racers');
                const racers = await racerResp.json();
                renderRacers(racers);

                // Setup WebSocket
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

                ws.onmessage = (event) => {
                    const updatedRacers = JSON.parse(event.data);
                    renderRacers(updatedRacers);
                };

                ws.onclose = () => {
                    console.log("WebSocket closed. Retrying in 5s...");
                    setTimeout(loadData, 5000);
                };

            } catch (err) {
                console.error("Failed to load racing data:", err);
            }
        }
        loadData();
    </script>
</body>
</html>
