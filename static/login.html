<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEAT Admin - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #111; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { background: #1a1a1a; border: 1px solid #333; border-radius: 10px; padding: 40px; width: 100%; max-width: 400px; }
        .admin-header { background: #d40000; color: white; padding: 10px 20px; border-radius: 5px; margin-bottom: 30px; text-align: center; }
        .form-control { background: #2a2a2a; border: 1px solid #444; color: white; }
        .form-control:focus { background: #333; border-color: #d40000; color: white; }
        .btn-primary { background: #d40000; border-color: #d40000; }
        .btn-primary:hover { background: #b30000; border-color: #b30000; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="admin-header">
            <h4><i class="fa-solid fa-gears me-2"></i>HEAT Admin Login</h4>
        </div>
        <form id="login-form">
            <div class="mb-3">
                <label class="form-label text-white">Username</label>
                <input type="text" class="form-control" name="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label text-white">Password</label>
                <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>
    </div>
    <script>
        (async () => {
            const res = await fetch('/api/check-setup');
            const data = await res.json();
            if (!data.setup) {
                window.location.href = '/setup.html';
            }
        })();

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const fd = new FormData(e.target);
            
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: fd.get('username'),
                    password: fd.get('password')
                })
            });
            
            if (res.ok) {
                window.location.href = '/admin.html';
            } else {
                alert('Invalid credentials');
            }
        });
    </script>
</body>
</html>
