<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Retro-Modern 1960s F1 Silhouette (Cigar Shape) -->
  <defs>
    <linearGradient id="bodyGradient" x1="100" y1="200" x2="450" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FF1E1E"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </linearGradient>
    <linearGradient id="chromeGradient" x1="0" y1="0" x2="0" y2="1" gradientTransform="rotate(45)">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#A0A0A0"/>
      <stop offset="100%" stop-color="#404040"/>
    </linearGradient>
    <filter id="heatGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Speed/Heat Blur -->
  <path d="M40 260 L180 260 M60 290 L160 290 M30 230 L170 230" stroke="#FF4D00" stroke-width="12" stroke-linecap="round" opacity="0.4" filter="url(#heatGlow)"/>

  <!-- The "Cigar" Body -->
  <g transform="translate(40, 40)">
    <!-- Exposed Exhaust Pipes (Chrome) -->
    <path d="M120 200 L60 190 M120 210 L60 220" stroke="url(#chromeGradient)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Main Chassis -->
    <path d="M80 210 C80 160 140 140 200 140 L400 160 C440 165 460 200 460 230 C460 260 440 295 400 300 L200 320 C140 320 80 300 80 250 Z" fill="url(#bodyGradient)" stroke="#222" stroke-width="2"/>
    
    <!-- Engine Cover / Headrest detail -->
    <path d="M180 150 C200 130 250 135 280 155" stroke="white" stroke-width="3" fill="none" opacity="0.3"/>

    <!-- Cockpit Opening -->
    <ellipse cx="260" cy="180" rx="60" ry="25" fill="#111" transform="rotate(-5, 260, 180)"/>
    
    <!-- Small Windscreen -->
    <path d="M310 170 L340 160 C350 155 360 170 340 180 Z" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="1"/>

    <!-- Wheels (Vintage Style: Large, Deep Rims) -->
    <!-- Rear Wheel -->
    <circle cx="140" cy="270" r="65" fill="#050505" stroke="#222" stroke-width="4"/>
    <circle cx="140" cy="270" r="30" fill="#1A1A1A" stroke="#444" stroke-width="2"/> <!-- Rim -->
    <path d="M130 270 L150 270 M140 260 L140 280" stroke="#666" stroke-width="2"/> <!-- Hub -->

    <!-- Front Wheel -->
    <circle cx="400" cy="250" r="50" fill="#050505" stroke="#222" stroke-width="4"/>
    <circle cx="400" cy="250" r="22" fill="#1A1A1A" stroke="#444" stroke-width="2"/>
    
    <!-- Suspension Arms -->
    <path d="M360 230 L400 250 M180 250 L140 270" stroke="#333" stroke-width="6" stroke-linecap="round"/>

    <!-- Racing Number Circle -->
    <circle cx="220" cy="235" r="35" fill="white" opacity="0.9"/>
    <text x="220" y="250" font-family="Arial, sans-serif" font-size="40" font-weight="900" text-anchor="middle" fill="#222">H</text>
  </g>
</svg>
