version: '3'

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  install:
    desc: Install all dependencies (Go, NPM, Playwright)
    cmds:
      - go mod download
      - npm install
      - npx playwright install --with-deps chromium

  fmt:
    desc: Format code (Go)
    cmds:
      - go fmt ./...

  test:
    desc: Run Go unit and database tests
    cmds:
      - go test -v ./...

  test:e2e:
    desc: Run Playwright end-to-end tests
    cmds:
      - npx playwright test

  build:
    desc: Build the Go binary
    cmds:
      - go build -o heat-server .

  run:
    desc: Run the application locally
    cmds:
      - go run main.go

  docker:build:
    desc: Build Docker image
    cmds:
      - docker build . -t heat:local

  clean:
    desc: Clean build artifacts and local database
    cmds:
      - rm -f heat-server
      - rm -f heat.db
      - rm -rf playwright-report
      - rm -rf test-results

  all:
    desc: Run format, test, and build
    cmds:
      - task: fmt
      - task: test
      - task: build
